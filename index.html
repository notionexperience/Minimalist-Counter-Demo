<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Counter Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --bg-page: #f9f9f9;
            --bg-card: #ffffff;
            --text-primary: #37352f;
            --text-secondary: #a1a1a1;
            --border-color: #eeeeee;
            --accent-blue: #2383e2;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding-bottom: 72px; /* space for fixed footer */
        }

        .promo-footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            opacity: 0.6;
            padding: 16px 12px;
            background: rgba(249, 249, 249, 0.9);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .counter-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 420px;
            margin: 20px;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            width: 100%;
        }

        .btn-circle {
            width: 56px;
            height: 56px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
            cursor: pointer;
            outline: none;
        }

        .btn-circle:hover {
            background-color: #f8f8f8;
            border-color: #d1d1d1;
        }

        .btn-circle:active {
            transform: scale(0.92);
            background-color: #f0f0f0;
        }

        .footer-label {
            font-size: 11px;
            letter-spacing: 0.08em;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .footer-label:hover {
            color: var(--text-primary);
        }

        .title-display {
            font-size: 1.125rem;
            font-weight: 500;
            color: var(--text-primary);
            opacity: 0.7;
            padding: 4px 0;
        }

        /* Prevent text selection during rapid clicking */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>

    <div class="counter-card flex flex-col items-center">
        <!-- Header -->
        <div class="w-full p-5 flex flex-col items-center">
            <div class="title-display">Main Counter</div>
            <div class="divider mt-4 opacity-70"></div>
        </div>

        <!-- Body -->
        <div class="flex flex-col items-center py-12 w-full">
            <div id="counterValue" class="text-[90px] font-medium leading-none tabular-nums no-select mb-2">
                0
            </div>
            <div id="goalDisplay" class="text-[11px] opacity-30 font-semibold mb-10 uppercase tracking-widest">
                Goal: 10
            </div>

            <div class="flex gap-10">
                <button id="btnDec" class="btn-circle text-2xl font-light">−</button>
                <button id="btnInc" class="btn-circle text-2xl font-light">+</button>
            </div>
        </div>

        <!-- Footer -->
        <div class="w-full p-6 flex flex-col items-center">
            <div class="divider mb-6 opacity-70"></div>
            <div class="w-full flex justify-between items-center px-4">
                <div class="flex gap-6">
                    <button id="btnReset" class="footer-label">Reset</button>
                    <button id="btnSettings" class="footer-label">Settings</button>
                </div>
                
                <div class="flex items-center gap-2 no-select">
                    <input type="checkbox" id="negToggle" class="w-3.5 h-3.5 rounded border-gray-300 accent-black cursor-pointer">
                    <label for="negToggle" class="footer-label cursor-pointer">Neg</label>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple state for demo
        let value = 0;
        let goal = 10;
        let allowNegative = false;

        const valEl = document.getElementById('counterValue');
        const goalEl = document.getElementById('goalDisplay');
        const negToggle = document.getElementById('negToggle');

        function updateDisplay() {
            valEl.textContent = value;
            // Visual feedback if goal is met
            if (goal > 0 && value >= goal) {
                valEl.classList.add('text-blue-600');
            } else {
                valEl.classList.remove('text-blue-600');
            }
        }

        document.getElementById('btnInc').onclick = () => {
            value++;
            updateDisplay();
        };

        document.getElementById('btnDec').onclick = () => {
            if (!allowNegative && value <= 0) {
                value = 0;
            } else {
                value--;
            }
            updateDisplay();
        };

        document.getElementById('btnReset').onclick = () => {
            value = 0;
            updateDisplay();
        };

        negToggle.onchange = (e) => {
            allowNegative = e.target.checked;
            if (!allowNegative && value < 0) {
                value = 0;
                updateDisplay();
            }
        };

        document.getElementById('btnSettings').onclick = () => {
            const newGoal = prompt("Enter new goal value:", goal);
            if (newGoal !== null) {
                goal = parseInt(newGoal) || 0;
                goalEl.textContent = goal > 0 ? `Goal: ${goal}` : "No Goal";
                updateDisplay();
            }
        };

        // Spacebar support for demo
        document.onkeydown = (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                value++;
                updateDisplay();
            }
        };
    </script>

    <footer class="promo-footer">
        <p>
            Built by <a href="https://thenotionexperience.gumroad.com/" target="_blank" class="underline hover:opacity-80">Notion Experience</a> ·
            <a href="https://thenotionexperience.gumroad.com/l/MinimalistCounterPro" target="_blank" class="underline hover:opacity-80">Get the Product</a> ·
            <a href="https://thenotionexperience.gumroad.com/subscribe" target="_blank" class="underline hover:opacity-80">Join the Newsletter</a>
        </p>
    </footer>
</body>
</html>
